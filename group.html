<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jacovella Group - Members</title>
  <meta name="description" content="Members of the Jacovella Group." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7; --surface: #ffffff; --text: #1d1d1f; --muted: #515154; --hint: #86868b;
      --border: rgba(0, 0, 0, 0.08); --border-strong: rgba(0, 0, 0, 0.15); --accent: #0066cc;
      --radius: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #151516; --surface: #222224; --text: #f5f5f7; --muted: #a1a1a6; --hint: #86868b;
        --border: rgba(255, 255, 255, 0.08); --border-strong: rgba(255, 255, 255, 0.15); --accent: #2997ff;
      }
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.7; }
    .container { max-width: 860px; margin: 0 auto; padding: 0 1.5rem 5rem; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.4rem 0; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
    .nav-logo { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { font-size: 12px; letter-spacing: 0.07em; text-transform: uppercase; text-decoration: none; color: var(--muted); transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); }
    
    .section-heading { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 2.5rem; letter-spacing: -0.02em; }
    
    .group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 2rem; margin-bottom: 4rem; }
    .member-card { text-align: center; }
    .member-avatar { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 600; margin: 0 auto 1rem; }
    .member-name { font-size: 16px; font-weight: 600; margin-bottom: 0.25rem; }
    .member-role { font-size: 14px; color: var(--muted); }

    footer { border-top: 1px solid var(--border); padding-top: 1.5rem; display: flex; justify-content: space-between; font-size: 12px; color: var(--hint); }
    @media (max-width: 640px) { nav { flex-direction: column; gap: 0.8rem; } .nav-links { flex-wrap: wrap; justify-content: center; gap: 1rem; } }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html" class="nav-logo">Jacovella Group</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="research.html">Research</a></li>
        <li><a href="publications.html">Publications</a></li>
        <li><a href="group.html" style="color: var(--text);">Group</a></li>
      </ul>
    </nav>

    <div class="section-heading">Group Members</div>

    <!-- PI Section -->
    <div class="group-section" id="pi-section">
      <div class="group-grid">
        <div class="member-card" data-pi="true" data-alumni="false">
          <div class="member-avatar" style="background:#dce8f8;color:#1a4080">UJ</div>
          <div class="member-name">Dr. Ugo Jacovella</div>
          <div class="member-role">Principal Investigator</div>
        </div>
      </div>
    </div>

    <div class="section-heading" style="margin-top: 4rem; font-size: 18px;">Current Members</div>
    <!-- CURRENT MEMBERS Section -->
    <div class="group-section" id="current-members">
      <div class="group-grid">
        <div class="member-card" data-pi="false" data-alumni="false">
          <div class="member-avatar" style="background:#d8f0e4;color:#1a5c38">APR</div>
          <div class="member-name">A.P. Rasmussen</div>
          <div class="member-role">Postdoctoral Fellow</div>
        </div>
        <div class="member-card" data-pi="false" data-alumni="false">
          <div class="member-avatar" style="background:#fef0d4;color:#7a4a0a">CR</div>
          <div class="member-name">C. Rossi</div>
          <div class="member-role">PhD Student</div>
        </div>
      </div>
    </div>

    <div class="section-heading" style="margin-top: 4rem; font-size: 18px;">Alumni</div>
    <!-- ALUMNI Section -->
    <div class="group-section" id="alumni">
      <div class="group-grid">
        <!-- Example Alumni (Placeholder) -->
        <div class="member-card" data-pi="false" data-alumni="true" style="opacity: 0.7;">
          <div class="member-avatar" style="background:#f5f5f7;color:#86868b">PA</div>
          <div class="member-name">Previous Alumnus</div>
          <div class="member-role">Former Master Student</div>
        </div>
      </div>
    </div>

    <footer>
      <span>&copy; 2026 Jacovella Group</span>
      <span>Built with GitHub Pages</span>
    </footer>
  </div>
</body>
</html>
